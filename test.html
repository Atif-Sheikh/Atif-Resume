<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google Analytics with Consent</title>
    <!-- Load the gtag.js library -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-8C0PN10WNY"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];

      function gtag() {
        dataLayer.push(arguments);
      }

      if (localStorage.getItem("cookieConsent") === null) {
        // Set default consent preferences
        gtag("consent", "default", {
          ad_storage: "denied",
          ad_user_data: "denied",
          ad_personalization: "denied",
          analytics_storage: "denied",
        });
      } else {
        gtag(
          "consent",
          "default",
          JSON.parse(localStorage.getItem("cookieConsent"))
        );
      }

      // Load the gtag library
      gtag("js", new Date());

      // Configure Google Analytics with your tracking ID
      gtag("config", "G-8C0PN10WNY");
    </script>
  </head>
  <body>
    <!-- Consent banner -->
    <div id="consent-banner">
      <p>
        We use cookies to improve your experience. By using our website, you
        agree to our use of cookies.
      </p>
      <button id="accept-consent">Accept</button>
      <button id="decline-consent">Decline</button>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const cookieConsentBanner = document.getElementById(
          "cookie-consent-banner"
        );
        const acceptCookiesButton = document.getElementById("accept-cookies");
        const declineCookiesButton = document.getElementById("decline-cookies");

        // Check if user has already given consent
        const userConsent = localStorage.getItem("cookieConsent");
        if (!userConsent) {
          cookieConsentBanner.style.display = "block";
        } else if (userConsent === "accepted") {
          initializeAnalytics();
        }

        // Event listener for accepting cookies
        acceptCookiesButton.addEventListener("click", function () {
          console.log("Accept Cookies!!!");
          localStorage.setItem("cookieConsent", "accepted");
          cookieConsentBanner.style.display = "none";
          initializeAnalytics();
        });

        // Event listener for declining cookies
        declineCookiesButton.addEventListener("click", function () {
          localStorage.setItem("cookieConsent", "declined");
          cookieConsentBanner.style.display = "none";
        });

        function initializeAnalytics() {
          const consentOptions = {
            ad_storage: "granted",
            ad_user_data: "granted",
            ad_personalization: "granted",
            analytics_storage: "granted",
          };
          gtag("consent", "update", consentOptions);
          localStorage.setItem("cookieConsent", JSON.stringify(consentOptions));
        }
      });
    </script>
  </body>
</html>
